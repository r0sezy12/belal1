<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Облачная практика</title>
</head>
<body>

<h1>Проект успешно запущен в облаке!</h1>
<hr>

<p>Работу выполнил студент: <strong>Гаппаров Белал</strong></p>

<h2>Отправка данных в Firebase</h2>

<input id="name" placeholder="Введите имя"><br><br>
<input id="email" placeholder="Введите email"><br><br>

<button onclick="sendData()">Отправить</button>
  <div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// Твой конфиг из скриншота
const firebaseConfig = {
  apiKey: "AIzaSyAs_Ldj7yMMzbDBSR89o3OV4245k-cpmyQ",
  authDomain: "belal-a68b1.firebaseapp.com",
  projectId: "belal-a68b1",
  storageBucket: "belal-a68b1.firebasestorage.app",
  messagingSenderId: "157333722793",
  appId: "1:157333722793:web:4342f40b13cfa71acffbb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db; // Это нужно для теста на взлом

// Функция отправки (добавляем лайки и время)
window.sendData = async () => {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  try {
    await addDoc(collection(db, "requests"), {
      name: name,
      email: email,
      likes: 0,
      timestamp: serverTimestamp()
    });
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
  } catch (e) {
    alert("Ошибка: проверь правила Rules!");
  }
};

// Функция лайка (атомарная)
window.processLike = async (id) => {
  await updateDoc(doc(db, "requests", id), {
    likes: increment(1)
  });
};

// Живое обновление ленты (onSnapshot)
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = ""; 
  snapshot.forEach((doc) => {
    const res = doc.data();
    feed.innerHTML += `
      <div style="border: 1px solid #ccc; padding: 10px; margin: 10px; border-radius: 8px;">
        <b>${res.name}</b> (${res.email}) <br>
        <button onclick="processLike('${doc.id}')">👍 ${res.likes || 0}</button>
      </div>`;
  });
</script>

</body>
</html>
