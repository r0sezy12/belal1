<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Облачная практика — Белал</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .post { border: 1px solid #eee; padding: 15px; margin-top: 15px; background: #fff; border-radius: 8px; }
        .like-btn { background: #e7f3ff; color: #007bff; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Проект в облаке!</h1>
    <p>Студент: <strong>Гаппаров Белал</strong>, группа <strong>ПО-3</strong></p>
    <hr>
    
    <h2>Отправка данных</h2>
    <input id="name" placeholder="Введите имя">
    <input id="email" placeholder="Введите email">
    <button onclick="sendData()">Отправить в Firebase</button>
</div>

<div id="feed" style="max-width: 540px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAs_Ldj7yMMzbDBSR89o3OV4245k-cpmyQ",
        authDomain: "belal-a68b1.firebaseapp.com",
        projectId: "belal-a68b1",
        storageBucket: "belal-a68b1.firebasestorage.app",
        messagingSenderId: "157333722793",
        appId: "1:157333722793:web:4342f40b13cfa71acffbb8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Сделаем функции доступными для HTML-кнопок
    window.sendData = async () => {
        const nameEl = document.getElementById("name");
        const emailEl = document.getElementById("email");
        
        if (nameEl.value.length < 3) return alert("Имя слишком короткое!");

        try {
            await addDoc(collection(db, "requests"), {
                name: nameEl.value,
                email: emailEl.value,
                likes: 0,
                timestamp: serverTimestamp()
            });
            nameEl.value = "";
            emailEl.value = "";
        } catch (e) {
            alert("Ошибка безопасности: данные отклонены сервером!");
            console.error(e);
        }
    };

    window.processLike = async (id) => {
        try {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, {
                likes: increment(1)
            });
        } catch (e) {
            alert("Ошибка: вы не можете менять ничего, кроме лайков!");
        }
    };

    // Real-time слушатель
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById("feed");
        feed.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const res = doc.data();
            const date = res.timestamp ? res.timestamp.toDate().toLocaleTimeString() : "...";
            feed.innerHTML += `
                <div class="post">
                    <small style="float:right; color: #999;">${date}</small>
                    <b>${res.name}</b> <br>
                    <span style="color: #666;">${res.email}</span> <br>
                    <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${res.likes || 0}</button>
                </div>`;
        });
    });
</script>

</body>
</html>
