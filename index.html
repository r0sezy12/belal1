<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Монитор группы</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f4;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h3 {
      margin-top: 0;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .green { background: #2ecc71; }
    .yellow { background: #f1c40f; color: #000; }
    .blue { background: #3498db; }
    .gray { background: #7f8c8d; }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="card">
    <h3>Мой профиль</h3>
    <div id="info">Вы зашли как: ...</div>

    <div class="buttons">
      <button class="green" onclick="changeStatus('Учёба')">📚 Учёба</button>
      <button class="yellow" onclick="changeStatus('Кофе')">☕ Кофе</button>
      <button class="blue" onclick="changeStatus('В игре')">🎮 В игре</button>
      <button class="gray" onclick="changeStatus('Дома')">🏠 Дома</button>
    </div>
  </div>

  <div class="card">
    <h3>Монитор группы</h3>
    <div id="group-list"></div>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const URL = "https://yyhxkerpjvntoflbmmny.supabase.co"
const KEY = "sb_publishable_idalKmPYLEUAMuEl0hjZEQ_CjFIWrRZ"

const supabase = createClient(URL, KEY)

const MY_ID = "c75c9c53-595b-419f-adf5-f253b4214dc3"

window.changeStatus = async (text) => {
  const { error } = await supabase
    .from("profiles")
    .update({ status: text })
    .eq("id", MY_ID)

  if (error) {
    alert(error.message)
   console.error(error)
  } else {
    fetchGroup()
  }
}

async function fetchGroup() {
  const { data, error } = await supabase
    .from("profiles")
    .select("*")
    .order("username", { ascending: true })

  if (error) return console.error(error)

  const list = document.getElementById("group-list")

  list.innerHTML = data.map(user => `
    <div class="user">
      <div class="dot"></div>
      <div>
        <div>${user.username}</div>
        <small>${user.status || 'Не указан'}</small>
      </div>
    </div>
  `).join("")

  const me = data.find(u => u.id === MY_ID)
  if (me) {
    document.getElementById("info").innerText =
      `Вы зашли как: ${me.username}`
  }
}

fetchGroup()
setInterval(fetchGroup, 5000)
</script>

</body>
</html>
