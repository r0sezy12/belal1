<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Облачная практика — Гаппаров Белал</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .post { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; width: 100%; max-width: 450px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; border-left: 6px solid #007bff; }
        .like-btn { background: #e7f3ff; color: #007bff; width: auto; padding: 5px 15px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Облачная практика</h2>
    <p>Студент: <b>Гаппаров Белал</b> (ПО-3)</p>
    <input type="text" id="name" placeholder="Ваше имя">
    <input type="email" id="email" placeholder="Ваш Email">
    <button onclick="sendData()">Опубликовать запись</button>
</div>

<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // Твой конфиг
    const firebaseConfig = {
        apiKey: "AIzaSyAs_Ldj7yMMzbDBSR89o3OV4245k-cpmyQ",
        authDomain: "belal-a68b1.firebaseapp.com",
        projectId: "belal-a68b1",
        storageBucket: "belal-a68b1.firebasestorage.app",
        messagingSenderId: "157333722793",
        appId: "1:157333722793:web:4342f40b13cfa71acffbb8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db; // Обязательно для теста на взлом

    // Функция отправки
    window.sendData = async () => {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        try {
            await addDoc(collection(db, "requests"), {
                name, email, likes: 0, timestamp: serverTimestamp()
            });
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
        } catch (e) {
            alert("Ошибка! Проверьте правила доступа или корректность данных.");
        }
    };

    // Функция лайка
    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), {
            likes: increment(1)
        });
    };

    // Слушатель ленты в реальном времени
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <b>${data.name}</b> <br>
                    <small>${data.email}</small> <br>
                    <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                </div>`;
        });
    });
</script>
</body>
</html>
