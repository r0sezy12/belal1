<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Practice - Advanced</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .search-box { background: #fff; border: 2px solid #007bff; }
        .post { background: white; padding: 15px; margin-top: 15px; border-radius: 10px; width: 100%; max-width: 450px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; border-left: 5px solid #28a745; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .del-btn { background: #dc3545; font-size: 12px; padding: 5px; }
        .like-btn { background: #28a745; width: auto; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Облачная Панель</h2>
    <p>Студент: <b>Белал Гаппаров</b></p>
    <input type="text" id="name" placeholder="Имя пользователя">
    <input type="email" id="email" placeholder="Email">
    <button onclick="sendData()">Отправить в Firebase</button>
</div>

<div class="card" style="padding: 15px;">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск по имени..." oninput="renderFeed()">
</div>

<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAs_Ldj7yMMzbDBSR89o3OV4245k-cpmyQ",
        authDomain: "belal-a68b1.firebaseapp.com",
        projectId: "belal-a68b1",
        storageBucket: "belal-a68b1.firebasestorage.app",
        messagingSenderId: "157333722793",
        appId: "1:157333722793:web:4342f40b13cfa71acffbb8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allPosts = []; // Хранилище для поиска

    // 1. ОТПРАВКА
    window.sendData = async () => {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        try {
            await addDoc(collection(db, "requests"), {
                name, email, likes: 0, timestamp: serverTimestamp()
            });
            document.getElementById("name").value = "";
        } catch (e) { alert("Ошибка Rules!"); }
    };

    // 2. ЛАЙКИ
    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };

    // 3. НОВАЯ ФУНКЦИЯ: ПОПЫТКА УДАЛЕНИЯ (для теста безопасности)
    window.tryDelete = async (id) => {
        try {
            await deleteDoc(doc(db, "requests", id));
        } catch (e) {
            alert("Критическая ошибка: Удаление запрещено правилами Security Rules!");
            console.error("Access Denied:", e.message);
        }
    };

    // 4. РЕАКТИВНЫЙ ВЫВОД + ПОИСК
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        allPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFeed();
    });

    window.renderFeed = () => {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        
        allPosts.filter(p => p.name.toLowerCase().includes(term)).forEach(p => {
            feed.innerHTML += `
                <div class="post">
                    <b>${p.name}</b> <br> <small>${p.email}</small>
                    <div class="btn-group">
                        <button class="like-btn" onclick="processLike('${p.id}')">👍 ${p.likes || 0}</button>
                        <button class="del-btn" onclick="tryDelete('${p.id}')">🗑 Удалить</button>
                    </div>
                </div>`;
        });
    };
</script>
</body>
</html>
